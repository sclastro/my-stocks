<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My US Stocks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Newsreader', 'Georgia', 'serif'],
            sans:    ['DM Sans', 'sans-serif'],
            mono:    ['DM Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <style>
    /* ══════════════════════════════════
       DESIGN TOKENS — Claude warm light
    ══════════════════════════════════ */
    :root {
      --bg:        #f9f7f4;   /* warm off-white page */
      --surface:   #ffffff;   /* card / table white */
      --surface2:  #f4f1ed;   /* inset tint */
      --border:    #e8e3db;   /* light warm border */
      --border2:   #d6cfc5;   /* stronger border */
      --text:      #1a1814;   /* near-black */
      --text2:     #6b6560;   /* secondary */
      --text3:     #a09890;   /* tertiary / placeholder */
      --accent:    #c96442;   /* terracotta — Claude warmth */
      --accent-bg: #fdf1ec;
      --green:     #2d7d4a;
      --green-bg:  #edf7f1;
      --red:       #c03030;
      --red-bg:    #fef0f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
      --r:         10px;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ── Page reveal ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    #app { animation: fadeUp .3s ease both; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -500px 0; }
      100% { background-position:  500px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--surface2) 50%, var(--border) 75%);
      background-size: 500px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
    }

    /* ══════════════════════════════════
       TOAST
    ══════════════════════════════════ */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 10px 16px; border-radius: var(--r); font-size: 13px;
      font-family: 'DM Mono', monospace;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); opacity: 0;
      transform: translateX(10px);
      transition: opacity .22s, transform .22s;
      max-width: 300px; box-shadow: var(--shadow-md);
    }
    .toast.show   { opacity:1; transform:translateX(0); }
    .toast.success{ border-left:3px solid var(--green); }
    .toast.error  { border-left:3px solid var(--red); }
    .toast.info   { border-left:3px solid var(--accent); }

    /* ══════════════════════════════════
       MODAL
    ══════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,24,20,.32);
      backdrop-filter: blur(6px) saturate(1.1);
      z-index: 1000; display: flex;
      align-items: center; justify-content: center; padding: 16px;
      opacity:0; pointer-events:none; transition: opacity .2s;
    }
    .modal-overlay.active { opacity:1; pointer-events:all; }

    #detail-modal .modal-box {
      width:100%; max-width:860px;
      max-height:90vh; overflow-y:auto;
      background: var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:0; box-shadow:var(--shadow-lg);
    }

    /* ══════════════════════════════════
       TABS
    ══════════════════════════════════ */
    .tab-btn {
      padding:7px 16px; border-radius:7px; font-size:13px; font-weight:500;
      color:var(--text2); cursor:pointer;
      transition:background .13s,color .13s;
      background:transparent; border:none;
      font-family:'DM Sans',sans-serif;
    }
    .tab-btn:hover  { background:var(--surface2); color:var(--text); }
    .tab-btn.active {
      background:var(--surface2); color:var(--text);
      box-shadow:inset 0 0 0 1px var(--border);
    }

    /* ══════════════════════════════════
       TABLE
    ══════════════════════════════════ */
    table { border-collapse:collapse; width:100%; }
    thead th {
      background:var(--surface2); font-size:11px; font-weight:600;
      letter-spacing:.08em; text-transform:uppercase;
      color:var(--text3); padding:10px 16px; white-space:nowrap;
    }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface2); }
    tbody td { padding:13px 16px; font-size:13.5px; }

    /* ══════════════════════════════════
       FORM ELEMENTS
    ══════════════════════════════════ */
    .inp {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      color:var(--text); border-radius:8px; padding:9px 12px; font-size:14px;
      font-family:'DM Mono',monospace; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .inp:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(201,100,66,.12);
      background:var(--surface);
    }
    .inp::placeholder { color:var(--text3); }

    .btn-primary {
      background:var(--accent); color:#fff; border:none; border-radius:8px;
      padding:9px 18px; font-size:13.5px; font-family:'DM Sans',sans-serif;
      font-weight:600; cursor:pointer; transition:filter .15s, transform .1s;
    }
    .btn-primary:hover  { filter:brightness(1.07); }
    .btn-primary:active { transform:scale(.98); }

    .btn-ghost {
      background:var(--surface); color:var(--text2); border:1px solid var(--border);
      border-radius:8px; padding:8px 14px; font-size:13px;
      font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer;
      transition:border-color .15s,color .15s,background .15s;
    }
    .btn-ghost:hover { border-color:var(--border2); color:var(--text); background:var(--surface2); }

    /* ══════════════════════════════════
       COMPONENTS
    ══════════════════════════════════ */
    .ticker-chip {
      font-family:'DM Mono',monospace; font-size:12.5px; font-weight:500;
      background:var(--accent-bg); color:var(--accent);
      border:1px solid rgba(201,100,66,.2); border-radius:6px;
      padding:2px 8px; display:inline-block; cursor:pointer;
      transition:background .13s;
    }
    .ticker-chip:hover { background:rgba(201,100,66,.2); }

    .editable {
      cursor:pointer; border-bottom:1px dashed var(--border2);
      display:inline-block; min-width:20px; color:var(--text2);
      transition:color .12s,border-color .12s;
    }
    .editable:hover { border-color:var(--accent); color:var(--text); }

    /* Change badges */
    .badge-up {
      display:inline-flex; align-items:center; gap:3px;
      background:var(--green-bg); color:var(--green);
      padding:2px 7px; border-radius:5px; font-size:12px;
      font-family:'DM Mono',monospace;
    }
    .badge-dn {
      display:inline-flex; align-items:center; gap:3px;
      background:var(--red-bg); color:var(--red);
      padding:2px 7px; border-radius:5px; font-size:12px;
      font-family:'DM Mono',monospace;
    }
    .badge-nil {
      display:inline-block;
      background:var(--surface2); color:var(--text3);
      padding:2px 7px; border-radius:5px; font-size:12px;
      font-family:'DM Mono',monospace;
    }

    /* Toggle */
    .toggle { position:relative; display:inline-block; width:34px; height:19px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; inset:0; background:var(--border2); border-radius:99px; transition:.2s; }
    .slider::before {
      content:''; position:absolute; height:13px; width:13px; left:3px; bottom:3px;
      background:#fff; border-radius:50%; transition:.2s;
      box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    input:checked + .slider { background:var(--accent); }
    input:checked + .slider::before { transform:translateX(15px); }

    /* Stat card */
    .stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; }
    .stat-label { font-size:10.5px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
    .stat-value { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--text); }

    /* News card */
    .news-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:16px; text-decoration:none; display:block;
      transition:border-color .15s, box-shadow .15s;
    }
    .news-card:hover { border-color:var(--border2); box-shadow:var(--shadow-sm); }

    /* Meta row */
    .meta-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;
    }
    .meta-row:last-child { border-bottom:none; }

    /* Chart wrapper */
    #chart-wrapper { position:relative; height:280px; }
  </style>
</head>

<body>

<!-- ── Toasts ── -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════
     MAIN PAGE
══════════════════════════════════ -->
<div id="app" class="max-w-6xl mx-auto px-4 sm:px-8 py-10">

  <!-- Header -->
  <header class="flex flex-col sm:flex-row sm:items-end justify-between gap-5 mb-8">
    <div>
      <h1 class="font-display font-semibold" style="font-size:1.85rem;letter-spacing:-.03em;color:var(--text)">
        My US Stocks
      </h1>
      <p class="mt-1 text-sm" style="color:var(--text3)">
        <span id="ticker-count" class="font-mono" style="color:var(--text2)">0</span> positions
        &nbsp;·&nbsp; last refresh <span id="last-refresh" class="font-mono" style="color:var(--text2)">—</span>
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-2.5">
      <!-- Auto-refresh toggle -->
      <label class="flex items-center gap-2 text-xs cursor-pointer select-none" style="color:var(--text3)">
        <label class="toggle">
          <input type="checkbox" id="auto-refresh-toggle" checked />
          <span class="slider"></span>
        </label>
        Auto 60s
      </label>

      <!-- Refresh -->
      <button id="refresh-all-btn" class="btn-ghost flex items-center gap-1.5">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
        Refresh
      </button>

      <!-- Add Ticker -->
      <button id="add-ticker-btn" class="btn-primary flex items-center gap-1.5">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Ticker
      </button>
    </div>
  </header>

  <!-- Portfolio table -->
  <div class="rounded-xl overflow-hidden" style="border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm)">
    <div class="overflow-x-auto">
      <table>
        <thead>
          <tr>
            <th class="text-left">Ticker</th>
            <th class="text-left hidden md:table-cell">Company</th>
            <th class="text-right">Price</th>
            <th class="text-right">Chg %</th>
            <th class="text-right hidden lg:table-cell">Volume</th>
            <th class="text-right hidden sm:table-cell">Target</th>
            <th class="text-right hidden sm:table-cell">Shares</th>
            <th class="text-left hidden xl:table-cell">Notes</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>
        <tbody id="portfolio-tbody"></tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20 px-6">
      <div style="font-size:2.5rem;margin-bottom:12px">📈</div>
      <p class="font-display text-xl font-semibold mb-1.5" style="color:var(--text)">No positions yet</p>
      <p class="text-sm" style="color:var(--text3)">
        Click <span style="color:var(--accent);font-weight:600">+ Add Ticker</span> to build your portfolio
      </p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-8 text-center text-xs" style="color:var(--text3)">
    Powered by Finnhub · Not financial advice · Built with care
  </footer>
</div>

<!-- ══════════════════════════════════
     ADD TICKER MODAL
══════════════════════════════════ -->
<div id="add-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="w-full max-w-md rounded-2xl p-7" style="background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-lg)">
    <div class="flex items-center justify-between mb-6">
      <h2 class="font-display font-semibold" style="font-size:1.25rem;letter-spacing:-.02em">Add Ticker</h2>
      <button id="add-modal-close" class="w-7 h-7 flex items-center justify-center rounded-full text-sm transition-colors"
        style="color:var(--text3);background:var(--surface2)">✕</button>
    </div>

    <div class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest mb-1.5" style="color:var(--text3)">
          Ticker Symbol <span style="color:var(--accent)">*</span>
        </label>
        <input id="inp-ticker" class="inp" placeholder="e.g. AAPL" autocomplete="off" spellcheck="false" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest mb-1.5" style="color:var(--text3)">Target Price</label>
          <input id="inp-target" class="inp" placeholder="220.00" type="number" min="0" step="0.01" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest mb-1.5" style="color:var(--text3)">Shares</label>
          <input id="inp-shares" class="inp" placeholder="10" type="number" min="0" step="0.001" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest mb-1.5" style="color:var(--text3)">Notes</label>
        <input id="inp-notes" class="inp" placeholder="Optional note…" maxlength="80" />
      </div>
    </div>

    <div class="flex gap-3 mt-7">
      <button id="add-modal-cancel" class="btn-ghost flex-1">Cancel</button>
      <button id="add-modal-confirm" class="btn-primary flex-1">Add Position</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     DETAIL MODAL
══════════════════════════════════ -->
<div id="detail-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-box">

    <!-- Header -->
    <div class="flex items-start justify-between gap-4 p-6" style="border-bottom:1px solid var(--border)">
      <div class="flex items-center gap-3">
        <img id="d-logo" alt="logo" class="w-11 h-11 rounded-xl object-contain"
          style="background:var(--surface2);border:1px solid var(--border);display:none;padding:2px" />
        <div>
          <div class="flex items-center gap-2 mb-0.5">
            <span id="d-ticker" class="ticker-chip"></span>
            <span id="d-exchange" class="text-xs" style="color:var(--text3)"></span>
          </div>
          <h2 id="d-name" class="font-display font-semibold" style="font-size:1.25rem;letter-spacing:-.02em"></h2>
        </div>
      </div>
      <button id="detail-close" class="w-8 h-8 flex items-center justify-center rounded-full text-sm flex-shrink-0 transition-colors"
        style="color:var(--text3);background:var(--surface2)">✕</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 px-5 py-3" style="border-bottom:1px solid var(--border)">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="chart">Chart</button>
      <button class="tab-btn" data-tab="news">News</button>
    </div>

    <!-- Panels -->
    <div class="p-6">

      <!-- Overview -->
      <div id="panel-overview" class="tab-panel">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="d-stats-grid"></div>
        <p id="d-description" class="text-sm leading-relaxed mb-5" style="color:var(--text2)"></p>
        <div id="d-meta-grid"></div>
      </div>

      <!-- Chart -->
      <div id="panel-chart" class="tab-panel hidden">
        <div class="flex gap-1 mb-5">
          <button class="tab-btn active text-xs" data-range="1M">1M</button>
          <button class="tab-btn text-xs" data-range="3M">3M</button>
          <button class="tab-btn text-xs" data-range="6M">6M</button>
          <button class="tab-btn text-xs" data-range="1Y">1Y</button>
        </div>
        <div id="chart-wrapper"><canvas id="price-chart"></canvas></div>
        <p id="chart-loading" class="text-center text-sm mt-4" style="color:var(--text3)"></p>
      </div>

      <!-- News -->
      <div id="panel-news" class="tab-panel hidden">
        <div id="news-list" class="flex flex-col gap-3"></div>
        <p id="news-loading" class="text-center text-sm mt-4" style="color:var(--text3)"></p>
      </div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
'use strict';

/* ── API config ──
   API Key 已經安全儲存在 Netlify 環境變數，
   所有請求先經過 /api/finnhub proxy，唔會直接打去 Finnhub。
   呢個檔案完全唔含任何 secret。
── */
const PROXY_BASE = '/api/finnhub';

/* ── State ── */
let portfolio    = [];
let quoteCache   = {};
let profileCache = {};
let autoInterval = null;
let priceChart   = null;
let currentDetailTicker = null;

/* ── LocalStorage ── */
const LS_KEY = "portfolio_v2";
const savePortfolio = () => localStorage.setItem(LS_KEY, JSON.stringify(portfolio));
function loadPortfolio() {
  try { portfolio = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch(_) { portfolio = []; }
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function showToast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

/* ══════════════════════════════════
   API HELPERS
   所有請求都經過自己的 proxy，API Key 永遠唔出現喺瀏覽器
══════════════════════════════════ */
async function apiFetch(path) {
  // 將 Finnhub path 編碼後作為參數傳給 proxy
  // 例如：path = /quote?symbol=AAPL
  // 請求變成：GET /api/finnhub?path=/quote%3Fsymbol%3DAAPL
  const res = await fetch(`${PROXY_BASE}?path=${encodeURIComponent(path)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
const fetchQuote   = t => apiFetch(`/quote?symbol=${t}`);
const fetchProfile = async t => {
  if (profileCache[t]) return profileCache[t];
  const d = await apiFetch(`/stock/profile2?symbol=${t}`);
  profileCache[t] = d; return d;
};
const fetchCandles = (t, from, to) =>
  apiFetch(`/stock/candle?symbol=${t}&resolution=D&from=${from}&to=${to}`);
const fetchNews    = (t, from, to) =>
  apiFetch(`/company-news?symbol=${t}&from=${from}&to=${to}`);

const daysAgo = n => Math.floor(Date.now()/1000 - n*86400);
const nowTs   = ()  => Math.floor(Date.now()/1000);

/* ══════════════════════════════════
   RENDER TABLE
══════════════════════════════════ */
function renderPortfolio() {
  const tbody = document.getElementById('portfolio-tbody');
  const empty = document.getElementById('empty-state');
  document.getElementById('ticker-count').textContent = portfolio.length;

  if (!portfolio.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = portfolio.map((pos, idx) => {
    const q      = quoteCache[pos.ticker] || {};
    const price  = q.c;
    const change = q.dp;

    const priceHtml  = price != null
      ? `<span class="font-mono" style="font-weight:500">$${price.toFixed(2)}</span>`
      : `<span class="skeleton" style="width:54px;height:14px"></span>`;

    const changeHtml = change != null ? changeBadge(change)
      : `<span class="skeleton" style="width:46px;height:18px;border-radius:5px"></span>`;

    const volStr = q.v != null ? fmtVol(q.v) : '—';
    const target = pos.target != null ? pos.target : '—';
    const shares = pos.shares != null ? pos.shares : '—';

    return `
    <tr>
      <td>
        <button class="ticker-chip" onclick="openDetail('${pos.ticker}')">${pos.ticker}</button>
      </td>
      <td class="hidden md:table-cell" style="color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">
        ${pos.name ?? '—'}
      </td>
      <td class="text-right">${priceHtml}</td>
      <td class="text-right">${changeHtml}</td>
      <td class="text-right hidden lg:table-cell font-mono" style="color:var(--text3);font-size:12px">${volStr}</td>
      <td class="text-right hidden sm:table-cell">
        <span class="editable font-mono" style="font-size:12px" onclick="editField(${idx},'target',this)" title="Click to edit">${target}</span>
      </td>
      <td class="text-right hidden sm:table-cell">
        <span class="editable font-mono" style="font-size:12px" onclick="editField(${idx},'shares',this)" title="Click to edit">${shares}</span>
      </td>
      <td class="hidden xl:table-cell" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        <span class="editable" style="font-size:12px;color:var(--text3)" onclick="editField(${idx},'notes',this)" title="Click to edit">${pos.notes ?? '—'}</span>
      </td>
      <td class="text-center">
        <button onclick="deleteTicker(${idx})"
          class="text-xs px-2.5 py-1 rounded-md transition-all"
          style="color:var(--text3);border:1px solid var(--border);background:transparent"
          onmouseover="this.style.color='var(--red)';this.style.borderColor='var(--red)';this.style.background='var(--red-bg)'"
          onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)';this.style.background='transparent'">
          Del
        </button>
      </td>
    </tr>`;
  }).join('');
}

/* ── Change badge ── */
function changeBadge(dp) {
  if (dp == null) return '<span class="badge-nil">—</span>';
  const sign = dp >= 0 ? '+' : '';
  const cls  = dp >= 0 ? 'badge-up' : 'badge-dn';
  const arrow= dp >= 0 ? '↑' : '↓';
  return `<span class="${cls}">${arrow} ${sign}${dp.toFixed(2)}%</span>`;
}

/* ── Inline editing ── */
function editField(idx, field, el) {
  const old = portfolio[idx][field] ?? '';
  const inp = document.createElement('input');
  inp.type  = field === 'notes' ? 'text' : 'number';
  inp.value = old;
  inp.className = 'inp';
  inp.style.cssText = 'width:82px;padding:3px 7px;height:26px;font-size:12px';
  el.replaceWith(inp);
  inp.focus(); inp.select();

  function commit() {
    const v = inp.value.trim();
    portfolio[idx][field] = v === '' ? undefined : (field === 'notes' ? v : parseFloat(v));
    savePortfolio(); renderPortfolio();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.value = old; inp.blur(); }
  });
}

/* ── Formatters ── */
function fmtVol(v) {
  if (!v) return '—';
  if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return String(v);
}
function fmtMkCap(mc) {
  if (mc >= 1e6) return `$${(mc/1e6).toFixed(2)}T`;
  if (mc >= 1e3) return `$${(mc/1e3).toFixed(2)}B`;
  return `$${mc.toFixed(2)}M`;
}

/* ══════════════════════════════════
   QUOTE REFRESH
══════════════════════════════════ */
async function refreshAll(silent = false) {
  if (!portfolio.length) return;
  if (!silent) showToast('Refreshing quotes…', 'info');

  await Promise.allSettled(portfolio.map(async pos => {
    try {
      quoteCache[pos.ticker] = await fetchQuote(pos.ticker);
      if (!pos.name) {
        try { const p = await fetchProfile(pos.ticker); pos.name = p.name || pos.ticker; savePortfolio(); }
        catch(_) {}
      }
    } catch(e) { console.warn(`Quote failed: ${pos.ticker}`, e.message); }
  }));

  document.getElementById('last-refresh').textContent =
    new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  renderPortfolio();
}

/* ══════════════════════════════════
   ADD TICKER
══════════════════════════════════ */
function openAddModal() {
  ['inp-ticker','inp-target','inp-shares','inp-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('add-modal').classList.add('active');
  setTimeout(() => document.getElementById('inp-ticker').focus(), 100);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('active'); }

async function confirmAdd() {
  const ticker = document.getElementById('inp-ticker').value.trim().toUpperCase();
  const target = parseFloat(document.getElementById('inp-target').value) || undefined;
  const shares = parseFloat(document.getElementById('inp-shares').value) || undefined;
  const notes  = document.getElementById('inp-notes').value.trim()       || undefined;

  if (!ticker) { showToast('Please enter a ticker symbol', 'error'); return; }
  if (portfolio.length >= 20) { showToast('Max 20 tickers allowed', 'error'); return; }
  if (portfolio.find(p => p.ticker === ticker)) { showToast(`${ticker} already in portfolio`, 'error'); return; }

  const btn = document.getElementById('add-modal-confirm');
  btn.disabled = true; btn.textContent = 'Adding…';

  try {
    const q = await fetchQuote(ticker);
    if (!q || q.c === 0) throw new Error('Invalid ticker or no data');
    quoteCache[ticker] = q;

    let name = ticker;
    try { const p = await fetchProfile(ticker); name = p.name || ticker; } catch(_) {}

    portfolio.push({ ticker, name, target, shares, notes });
    savePortfolio(); renderPortfolio();
    closeAddModal();
    showToast(`${ticker} added`, 'success');
    if (!autoInterval) startAutoRefresh();
  } catch(err) {
    showToast(`Failed: ${err.message}`, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Add Position';
  }
}

/* ══════════════════════════════════
   DELETE
══════════════════════════════════ */
function deleteTicker(idx) {
  const { ticker } = portfolio[idx];
  portfolio.splice(idx, 1);
  delete quoteCache[ticker];
  savePortfolio(); renderPortfolio();
  showToast(`${ticker} removed`, 'info');
}

/* ══════════════════════════════════
   DETAIL MODAL
══════════════════════════════════ */
async function openDetail(ticker) {
  currentDetailTicker = ticker;
  document.getElementById('detail-modal').classList.add('active');

  // Reset
  document.getElementById('d-ticker').textContent      = ticker;
  document.getElementById('d-name').textContent        = '';
  document.getElementById('d-exchange').textContent    = '';
  document.getElementById('d-description').textContent = 'Loading…';
  document.getElementById('d-stats-grid').innerHTML    = '';
  document.getElementById('d-meta-grid').innerHTML     = '';
  const logo = document.getElementById('d-logo');
  logo.style.display = 'none';

  switchTab('overview');

  try {
    const [profile, quote] = await Promise.all([
      fetchProfile(ticker),
      quoteCache[ticker] ? Promise.resolve(quoteCache[ticker]) : fetchQuote(ticker)
    ]);
    quoteCache[ticker] = quote;
    const pos = portfolio.find(p => p.ticker === ticker) || {};

    // Logo
    if (profile.logo) {
      logo.src = profile.logo; logo.style.display = 'block';
      logo.onerror = () => { logo.style.display = 'none'; };
    }
    document.getElementById('d-name').textContent     = profile.name || ticker;
    document.getElementById('d-exchange').textContent = profile.exchange || '';

    // Stats grid
    const stats = [
      { label:'Price',      value:`$${(quote.c??0).toFixed(2)}`, mono:true },
      { label:'Change',     html: changeBadge(quote.dp) },
      { label:'Day High',   value:`$${(quote.h??0).toFixed(2)}`, mono:true },
      { label:'Day Low',    value:`$${(quote.l??0).toFixed(2)}`, mono:true },
      { label:'Open',       value:`$${(quote.o??0).toFixed(2)}`, mono:true },
      { label:'Prev Close', value:`$${(quote.pc??0).toFixed(2)}`, mono:true },
      { label:'My Target',  value: pos.target ? `$${pos.target}` : '—', mono:true },
      { label:'My Shares',  value: pos.shares ?? '—', mono:true },
    ];
    document.getElementById('d-stats-grid').innerHTML = stats.map(s => `
      <div class="stat-card">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.html ?? (s.mono ? `<span>${s.value}</span>` : s.value)}</div>
      </div>`).join('');

    // Description
    document.getElementById('d-description').textContent =
      profile.description || 'No description available.';

    // Meta
    const meta = [
      ['Industry',    profile.finnhubIndustry || '—'],
      ['Country',     profile.country || '—'],
      ['Currency',    profile.currency || '—'],
      ['Market Cap',  profile.marketCapitalization ? fmtMkCap(profile.marketCapitalization) : '—'],
      ['IPO Date',    profile.ipo || '—'],
      ['Shares Out',  profile.shareOutstanding ? fmtVol(profile.shareOutstanding*1e6) : '—'],
    ];
    document.getElementById('d-meta-grid').innerHTML =
      meta.map(([k,v]) => `
        <div class="meta-row">
          <span style="color:var(--text3)">${k}</span>
          <span class="font-mono text-xs" style="color:var(--text)">${v}</span>
        </div>`).join('');

  } catch(err) {
    document.getElementById('d-description').textContent = 'Could not load profile data.';
    showToast(`Error: ${err.message}`, 'error');
  }
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('active');
  currentDetailTicker = null;
  if (priceChart) { priceChart.destroy(); priceChart = null; }
}

/* ── Tab switch ── */
function switchTab(name) {
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById(`panel-${name}`).classList.remove('hidden');
  if (name === 'chart') loadChart('1M');
  if (name === 'news')  loadNews();
}

/* ── Chart（使用 Yahoo Finance 免費歷史數據）── */
async function loadChart(range) {
  document.querySelectorAll('.tab-btn[data-range]').forEach(b =>
    b.classList.toggle('active', b.dataset.range === range));
  const ticker = currentDetailTicker;
  if (!ticker) return;

  const loading = document.getElementById('chart-loading');
  loading.textContent = 'Loading chart…';

  // 將頁面 range 轉換成 Yahoo Finance 的 range / interval 參數
  const rangeMap = {
    '1M': { range: '1mo',  interval: '1d'  },
    '3M': { range: '3mo',  interval: '1d'  },
    '6M': { range: '6mo',  interval: '1d'  },
    '1Y': { range: '1y',   interval: '1wk' },
  };
  const { range: yRange, interval: yInterval } = rangeMap[range] || rangeMap['1M'];

  try {
    // 經過自己的 yahoo-proxy，唔直接打 Yahoo（避免 CORS 問題）
    const res  = await fetch(`/api/yahoo?ticker=${ticker}&range=${yRange}&interval=${yInterval}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // Yahoo Finance 回傳的資料結構
    const result    = json?.chart?.result?.[0];
    const timestamps = result?.timestamp;
    const closes    = result?.indicators?.quote?.[0]?.close;

    if (!timestamps || !closes) throw new Error('No data returned');

    loading.textContent = '';

    // 過濾掉 null 值（停市日）
    const points = timestamps
      .map((ts, i) => ({ ts, price: closes[i] }))
      .filter(p => p.price != null);

    const labels = points.map(p =>
      new Date(p.ts * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric' }));
    const prices = points.map(p => p.price);

    if (priceChart) priceChart.destroy();

    const ctx   = document.getElementById('price-chart').getContext('2d');
    const up    = prices[prices.length-1] >= prices[0];
    const color = up ? '#2d7d4a' : '#c03030';
    const grad  = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, up ? 'rgba(45,125,74,.16)' : 'rgba(192,48,48,.16)');
    grad.addColorStop(1, 'rgba(249,247,244,0)');

    priceChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{
        data: prices, borderColor: color, backgroundColor: grad,
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 5,
        pointHoverBackgroundColor: color, fill: true, tension: .35,
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#fff', borderColor: '#e8e3db', borderWidth: 1,
            titleColor: '#a09890', bodyColor: '#1a1814',
            bodyFont: { family:'DM Mono', size:13 },
            titleFont: { family:'DM Sans', size:11 },
            padding: 10,
            callbacks: { label: c => `$${c.parsed.y.toFixed(2)}` }
          }
        },
        scales: {
          x: {
            ticks: { color:'#a09890', font:{ size:11, family:'DM Mono' }, maxTicksLimit:8 },
            grid:  { color:'#f4f1ed' }
          },
          y: {
            position: 'right',
            ticks: { color:'#a09890', font:{ size:11, family:'DM Mono' },
                     callback: v => `$${v.toFixed(0)}` },
            grid:  { color:'#f4f1ed' }
          }
        }
      }
    });
  } catch(err) { loading.textContent = `Chart unavailable: ${err.message}`; }
}

/* ── News ── */
async function loadNews() {
  const ticker = currentDetailTicker;
  const list   = document.getElementById('news-list');
  const loading= document.getElementById('news-loading');
  list.innerHTML = ''; loading.textContent = 'Loading news…';

  const from = new Date(); from.setMonth(from.getMonth()-6);
  const fmt  = d => d.toISOString().split('T')[0];

  try {
    const news  = await fetchNews(ticker, fmt(from), fmt(new Date()));
    const items = news.slice(0, 8);
    loading.textContent = '';

    if (!items.length) { loading.textContent = 'No recent news found.'; return; }

    list.innerHTML = items.map(n => {
      const date = new Date(n.datetime*1000).toLocaleDateString('en-US',
        { month:'short', day:'numeric', year:'numeric' });
      return `
      <a href="${n.url}" target="_blank" rel="noopener" class="news-card">
        <div class="flex items-center gap-2 mb-2" style="font-size:11px;color:var(--text3)">
          <span class="font-semibold uppercase tracking-wider">${n.source}</span>
          <span>·</span><span>${date}</span>
        </div>
        <div class="font-semibold mb-1" style="font-size:13.5px;color:var(--text);line-height:1.4">${n.headline}</div>
        <div style="font-size:12.5px;color:var(--text2);line-height:1.5;
          display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
          ${n.summary || ''}
        </div>
      </a>`;
    }).join('');
  } catch(err) { loading.textContent = `Failed: ${err.message}`; }
}

/* ══════════════════════════════════
   AUTO-REFRESH
══════════════════════════════════ */
function startAutoRefresh() {
  stopAutoRefresh();
  autoInterval = setInterval(() => refreshAll(true), 60_000);
}
function stopAutoRefresh() {
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadPortfolio();
  renderPortfolio();
  if (portfolio.length > 0) { refreshAll(true); startAutoRefresh(); }

  // Add modal
  document.getElementById('add-ticker-btn').addEventListener('click', openAddModal);
  document.getElementById('add-modal-close').addEventListener('click', closeAddModal);
  document.getElementById('add-modal-cancel').addEventListener('click', closeAddModal);
  document.getElementById('add-modal-confirm').addEventListener('click', confirmAdd);
  document.getElementById('add-modal').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.target.closest('button')) confirmAdd();
    if (e.key === 'Escape') closeAddModal();
  });
  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('add-modal')) closeAddModal();
  });

  // Refresh
  document.getElementById('refresh-all-btn').addEventListener('click', () => refreshAll(false));

  // Auto-refresh toggle
  document.getElementById('auto-refresh-toggle').addEventListener('change', e => {
    e.target.checked
      ? (startAutoRefresh(), showToast('Auto-refresh on', 'info'))
      : (stopAutoRefresh(),  showToast('Auto-refresh off', 'info'));
  });

  // Detail modal
  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-modal')) closeDetail();
  });
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn =>
    btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
  document.querySelectorAll('.tab-btn[data-range]').forEach(btn =>
    btn.addEventListener('click', () => loadChart(btn.dataset.range)));

  // Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeDetail(); closeAddModal(); }
  });
});
</script>
</body>
